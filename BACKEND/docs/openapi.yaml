openapi: 3.0.3
info:
  title: PowerSense Renewable API
  version: 1.0.0
  description: Renewable module endpoints for sources, records, maintenance, analytics, and third-party weather insights.
servers:
  - url: http://localhost:5000/api
paths:
  /renewable/sources:
    get:
      summary: List renewable sources
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Source list
    post:
      summary: Create renewable source
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Source created
  /renewable/records:
    get:
      summary: List energy records
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Record list
    post:
      summary: Create energy record
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Record created
  /renewable/maintenance:
    get:
      summary: List maintenance tasks
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Maintenance list
    post:
      summary: Create maintenance task
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Maintenance task created
  /renewable/weather-insights:
    get:
      summary: Get third-party weather forecast insights
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: location
          schema:
            type: string
          description: City or location label
        - in: query
          name: sourceId
          schema:
            type: string
          description: Existing source id
      responses:
        '200':
          description: Weather forecast insight data
  /renewable/admin/overview:
    get:
      summary: Admin-level renewable summary
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Admin summary
        '403':
          description: Forbidden for non-admin users
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
