# Exported from Render on 2026-04-11T20:31:09Z
version: "1"
projects:
- name: My project
  environments:
  - name: Production
    services:
    - type: web
      name: PowerSense-api
      runtime: node
      repo: https://github.com/Nisal-Dushmantha/PowerSense
      plan: free
      disks:
      - name: powersense-whatsapp-auth
        mountPath: /var/data/powersense_wwebjs_auth
        sizeGB: 1
      envVars:
      - key: JWT_SECRET
        sync: false
      - key: WHATSAPP_ENABLED
        value: "true"
      - key: WHATSAPP_WEB_ENABLED
        value: "true"
      - key: WHATSAPP_SHARE_CLIENT
        value: "true"
      - key: WHATSAPP_SESSION_NAME
        value: "powersense-notifier"
      - key: WHATSAPP_CLIENT_ID
        value: "powersense-otp"
      - key: WHATSAPP_AUTH_PATH
        value: "/var/data/powersense_wwebjs_auth"
      - key: WHATSAPP_AUTH_DATA_PATH
        value: "/var/data/powersense_wwebjs_auth"
      - key: WHATSAPP_INIT_MAX_RETRIES
        value: "8"
      - key: WHATSAPP_INIT_RETRY_DELAY_MS
        value: "4000"
      - key: PUPPETEER_CACHE_DIR
        value: "/opt/render/project/.cache/puppeteer"
      - key: GENERATE_SOURCEMAP
        sync: false
      - key: MONGO_URI
        sync: false
      region: singapore
      buildCommand: npm install; npx -y @puppeteer/browsers install chrome@146.0.7680.153 --path /opt/render/project/.cache/puppeteer
      startCommand: mkdir -p /opt/render/project/.cache/puppeteer /var/data/powersense_wwebjs_auth; export CHROMIUM_PATH=$(find /opt/render/project/.cache/puppeteer -type f -path '*/chrome-linux64/chrome' | head -n 1); if [ -z "$CHROMIUM_PATH" ]; then export CHROMIUM_PATH=/usr/bin/chromium-browser; fi; echo "Using CHROMIUM_PATH=$CHROMIUM_PATH"; npm start
      autoDeployTrigger: commit
      rootDir: BACKEND
